<div class="p-8">

  <!-- Header -->
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-10">

    <div>

      <h1 class="text-4xl font-bold text-[#2f1b12]">
        Editar producto
      </h1>

      <p class="text-[#8a542f] mt-2">
        Modifica información, stock, promociones y detalles del producto.
      </p>

    </div>

    <a
      routerLink="/admin/inventario"
      class="border border-[#4b2e1f] text-[#4b2e1f] hover:bg-[#4b2e1f] hover:text-white px-6 py-3 rounded-xl font-semibold transition text-center"
    >
      Volver
    </a>

  </div>

  <!-- Grid -->
  <div class="grid grid-cols-1 xl:grid-cols-[1fr_380px] gap-8">

    <!-- Formulario -->
    <section class="bg-white rounded-2xl shadow-md p-8">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- Nombre -->
        <div class="md:col-span-2">

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Nombre del producto
          </label>

          <input
            type="text"
            [(ngModel)]="producto.nombre"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >

        </div>

        <!-- Código -->
        <div>

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Código
          </label>

          <input
            type="text"
            [(ngModel)]="producto.codigo"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >

        </div>

        <!-- Precio -->
        <div>

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Precio
          </label>

          <input
            type="number"
            [(ngModel)]="producto.precio"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >

        </div>

        <!-- Categoría -->
        <div>

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Categoría
          </label>

          <select
            [(ngModel)]="producto.categoria"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
            <option>Botas</option>
            <option>Sombreros</option>
            <option>Camisas</option>
            <option>Pantalones</option>
          </select>

        </div>

        <!-- Stock -->
        <div>

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Stock
          </label>

          <input
            type="number"
            [(ngModel)]="producto.stock"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >

        </div>

        <!-- Estado -->
        <div>

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Estado
          </label>

          <select
            [(ngModel)]="producto.estado"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
            <option>Activo</option>
            <option>Agotado</option>
            <option>Oculto</option>
          </select>

        </div>

        <!-- Tallas -->
        <div class="md:col-span-2">

          <label class="block text-[#2f1b12] mb-3 font-medium">
            Tallas disponibles
          </label>

          <div class="flex flex-wrap gap-3">

            <button class="px-4 py-2 rounded-lg bg-[#8a542f] text-white">
              25
            </button>

            <button class="px-4 py-2 rounded-lg bg-[#8a542f] text-white">
              26
            </button>

            <button class="px-4 py-2 rounded-lg bg-[#8a542f] text-white">
              27
            </button>

            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">
              28
            </button>

            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">
              29
            </button>

          </div>

        </div>

        <!-- Descripción -->
        <div class="md:col-span-2">

          <label class="block text-[#2f1b12] mb-2 font-medium">
            Descripción
          </label>

          <textarea
            rows="6"
            [(ngModel)]="producto.descripcion"
            class="w-full border border-[#d8c5aa] rounded-lg p-4 outline-none resize-none focus:ring-2 focus:ring-[#8a542f]"
          ></textarea>

        </div>

<!-- PROMOCIONES -->
        <div class="md:col-span-2 bg-[#f5ede1] border border-[#eadcc7] rounded-2xl p-6">

          <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">

            <div>
              <h2 class="text-2xl font-bold text-[#2f1b12]">
                Promociones y marketing
              </h2>

              <p class="text-[#8a542f] mt-1">
                Configura descuentos, MSI y etiquetas visibles en la tienda.
              </p>
            </div>

            <label class="flex items-center gap-3 font-bold text-[#2f1b12]">
              <input
                type="checkbox"
                [(ngModel)]="producto.promocionActiva"
                class="w-5 h-5"
              >
              Activar promoción
            </label>

          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

            <div>
              <label class="block text-[#2f1b12] mb-2 font-medium">
                Porcentaje de descuento
              </label>

              <input
                type="number"
                min="0"
                max="100"
                [(ngModel)]="producto.porcentajeDescuento"
                [disabled]="!producto.promocionActiva"
                class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f] disabled:bg-gray-100"
              >
            </div>

            <div>
              <label class="block text-[#2f1b12] mb-2 font-medium">
                Precio con descuento
              </label>

              <input
                type="text"
                [value]="'$' + (precioOferta | number:'1.0-2') + ' MXN'"
                disabled
                class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 bg-white text-[#2f1b12] font-bold"
              >
            </div>

            <div>
              <label class="block text-[#2f1b12] mb-2 font-medium">
                Fecha inicio promoción
              </label>

              <input
                type="date"
                [(ngModel)]="producto.fechaInicioPromo"
                [disabled]="!producto.promocionActiva"
                class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f] disabled:bg-gray-100"
              >
            </div>

            <div>
              <label class="block text-[#2f1b12] mb-2 font-medium">
                Fecha fin promoción
              </label>

              <input
                type="date"
                [(ngModel)]="producto.fechaFinPromo"
                [disabled]="!producto.promocionActiva"
                class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f] disabled:bg-gray-100"
              >
            </div>

            <div>
              <label class="block text-[#2f1b12] mb-2 font-medium">
                Etiqueta visible
              </label>

              <input
                type="text"
                [(ngModel)]="producto.etiquetaPromo"
                placeholder="Ej. 25% OFF"
                [disabled]="!producto.promocionActiva"
                class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f] disabled:bg-gray-100"
              >
            </div>

            <div>
              <label class="block text-[#2f1b12] mb-2 font-medium">
                Meses sin intereses
              </label>

              <select
                [(ngModel)]="producto.mesesMsi"
                [disabled]="!producto.msiActivo"
                class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f] disabled:bg-gray-100"
              >
                <option [value]="0">Sin MSI</option>
                <option [value]="3">3 meses</option>
                <option [value]="6">6 meses</option>
                <option [value]="9">9 meses</option>
                <option [value]="12">12 meses</option>
              </select>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-3 gap-4 pt-4">

              <label class="flex items-center gap-3 bg-white p-4 rounded-xl font-semibold text-[#2f1b12]">
                <input
                  type="checkbox"
                  [(ngModel)]="producto.msiActivo"
                  class="w-5 h-5"
                >
                Activar MSI
              </label>

              <label class="flex items-center gap-3 bg-white p-4 rounded-xl font-semibold text-[#2f1b12]">
                <input
                  type="checkbox"
                  [(ngModel)]="producto.ultimasPiezas"
                  class="w-5 h-5"
                >
                Últimas piezas
              </label>

              <label class="flex items-center gap-3 bg-white p-4 rounded-xl font-semibold text-[#2f1b12]">
                <input
                  type="checkbox"
                  [(ngModel)]="producto.promocionDestacada"
                  class="w-5 h-5"
                >
                Destacar en ofertas
              </label>

            </div>

          </div>

        </div>

      </div>

      <!-- Botones -->
      <div class="flex flex-wrap gap-4 mt-10">

        <button class="bg-[#4b2e1f] hover:bg-[#6b3f26] text-white px-8 py-3 rounded-lg font-semibold transition">
          Guardar cambios
        </button>

        <button class="bg-red-100 text-red-700 hover:bg-red-600 hover:text-white px-8 py-3 rounded-lg font-semibold transition">
          Eliminar producto
        </button>

      </div>

    </section>

    <!-- Imagen -->
    <aside class="bg-white rounded-2xl shadow-md p-8 h-fit">

      <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
        Imagen del producto
      </h2>

      <div class="h-[350px] bg-[#f5ede1] rounded-2xl flex flex-col items-center justify-center text-center">

        <span class="text-7xl mb-4">
          🥾
        </span>

        <p class="text-[#8a542f]">
          Imagen actual del producto
        </p>

      </div>

      <button class="w-full mt-6 bg-[#8a542f] hover:bg-[#6b3f26] text-white py-3 rounded-lg font-semibold transition">
        Cambiar imagen
      </button>

    </aside>

  </div>

</div>
