<div class="p-8">

  <h1 class="text-4xl font-bold text-[#2f1b12] mb-10">
    Agregar producto
  </h1>

  <div class="grid grid-cols-1 xl:grid-cols-[1fr_380px] gap-8">

    <section class="bg-white rounded-2xl shadow-md p-8">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div class="md:col-span-2">
          <label class="block text-[#2f1b12] mb-2 font-medium">Nombre del producto</label>
          <input class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]" placeholder="Ej. Bota Durango Clásica">
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">Código</label>
          <input class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]" placeholder="DW-001">
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">Precio</label>
          <input type="number" class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]" placeholder="$0.00">
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">Categoría</label>
          <select class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]">
            <option>Botas</option>
            <option>Sombreros</option>
            <option>Camisas</option>
            <option>Pantalones</option>
          </select>
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">Stock</label>
          <input type="number" class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]" placeholder="0">
        </div>

        <div class="md:col-span-2">
          <label class="block text-[#2f1b12] mb-3 font-medium">Tallas disponibles</label>

          <div class="flex flex-wrap gap-3">
            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">25</button>
            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">26</button>
            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">27</button>
            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">28</button>
            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">29</button>
            <button class="px-4 py-2 rounded-lg bg-[#f5ede1] hover:bg-[#8a542f] hover:text-white transition">30</button>
          </div>
        </div>

        <div class="md:col-span-2">
          <label class="block text-[#2f1b12] mb-2 font-medium">Descripción</label>
          <textarea rows="6" class="w-full border border-[#d8c5aa] rounded-lg p-4 outline-none resize-none focus:ring-2 focus:ring-[#8a542f]" placeholder="Descripción del producto..."></textarea>
        </div>

      </div>

      <div class="flex flex-wrap gap-4 mt-10">
        <button class="bg-[#4b2e1f] hover:bg-[#6b3f26] text-white px-8 py-3 rounded-lg font-semibold transition">
          Guardar producto
        </button>

        <button class="border border-[#4b2e1f] text-[#4b2e1f] hover:bg-[#4b2e1f] hover:text-white px-8 py-3 rounded-lg font-semibold transition">
          Cancelar
        </button>
      </div>

    </section>

    <aside class="bg-white rounded-2xl shadow-md p-8 h-fit">

      <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
        Imagen del producto
      </h2>

      <div class="h-[350px] bg-[#f5ede1] rounded-2xl flex flex-col items-center justify-center text-center">
        <span class="text-7xl mb-4">🖼️</span>
        <p class="text-[#8a542f]">Aquí se mostrará la imagen</p>
      </div>

      <button class="w-full mt-6 bg-[#8a542f] hover:bg-[#6b3f26] text-white py-3 rounded-lg font-semibold transition">
        Subir imagen
      </button>

    </aside>

  </div>

</div>
