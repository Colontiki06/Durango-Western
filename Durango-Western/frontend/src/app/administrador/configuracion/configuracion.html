<div class="p-5 md:p-8">

  <div class="mb-10">
    <h1 class="text-4xl font-bold text-[#2f1b12]">
      Configuración
    </h1>

    <p class="text-[#8a542f] mt-2">
      Administra la información general del sistema y preferencias del panel.
    </p>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">

    <!-- Información tienda -->
    <section class="bg-white rounded-2xl shadow-md p-8">

      <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
        Información de la tienda
      </h2>

      <div class="space-y-5">

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Nombre de la tienda
          </label>

          <input
            value="Durango Western"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Correo de contacto
          </label>

          <input
            value="contacto@durangowestern.com"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Teléfono
          </label>

          <input
            value="+52 618 000 0000"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Dirección principal
          </label>

          <textarea
            rows="4"
            class="w-full border border-[#d8c5aa] rounded-lg p-4 outline-none resize-none focus:ring-2 focus:ring-[#8a542f]"
          >Durango, México</textarea>
        </div>

      </div>

    </section>

    <!-- Configuración ecommerce -->
    <section class="bg-white rounded-2xl shadow-md p-8">

      <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
        Configuración de tienda
      </h2>

      <div class="space-y-5">

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Envío gratis desde
          </label>

          <input
            value="4000"
            type="number"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Moneda
          </label>

          <select class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]">
            <option>MXN - Peso mexicano</option>
            <option>USD - Dólar estadounidense</option>
          </select>
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Estado de la tienda
          </label>

          <select class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]">
            <option>Activa</option>
            <option>Modo mantenimiento</option>
          </select>
        </div>

        <div class="flex items-center justify-between bg-[#f5ede1] rounded-xl p-4">
          <div>
            <h3 class="font-bold text-[#2f1b12]">
              Permitir compras como invitado
            </h3>

            <p class="text-sm text-[#8a542f]">
              Los clientes podrán comprar sin iniciar sesión.
            </p>
          </div>

          <input type="checkbox" checked class="w-5 h-5">
        </div>

      </div>

    </section>

    <!-- Cuenta admin -->
   <section class="bg-white rounded-2xl shadow-md p-8 lg:col-span-2">

      <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
        Cuenta administrador
      </h2>

      <div class="space-y-5">

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Nombre
          </label>

          <input
            value="Marco Antonio"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
        </div>

        <div>
          <label class="block text-[#2f1b12] mb-2 font-medium">
            Correo administrador
          </label>

          <input
            value="admin@durangowestern.com"
            class="w-full h-12 border border-[#d8c5aa] rounded-lg px-4 outline-none focus:ring-2 focus:ring-[#8a542f]"
          >
        </div>

        <button class="bg-[#4b2e1f] hover:bg-[#6b3f26] text-white px-6 py-3 rounded-xl font-semibold transition">
          Cambiar contraseña
        </button>

      </div>

    </section>

  </div>

  <div class="mt-10 flex gap-4">

    <button class="bg-[#4b2e1f] hover:bg-[#6b3f26] text-white px-8 py-3 rounded-xl font-semibold transition">
      Guardar configuración
    </button>

    <button class="border border-[#4b2e1f] text-[#4b2e1f] hover:bg-[#4b2e1f] hover:text-white px-8 py-3 rounded-xl font-semibold transition">
      Cancelar
    </button>

  </div>

</div>
