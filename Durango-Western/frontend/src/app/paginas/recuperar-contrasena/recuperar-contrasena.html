<section class="min-h-screen bg-[#f3e3cc] flex items-center justify-center px-4 py-14">

  <div class="w-full max-w-[460px] bg-[#fff8ec] shadow-xl border border-[#d8c4a8] rounded-2xl overflow-hidden">

    <!-- Encabezado -->
    <div class="bg-[#5b2d16] px-8 py-9 text-center">
      <h1 class="text-white text-3xl font-bold tracking-wide">
        Recuperar contraseña
      </h1>

      <p class="text-[#f3e3cc] text-sm mt-3">
        Te enviaremos un enlace para cambiar tu contraseña
      </p>
    </div>

    <!-- Formulario -->
    <form
      class="px-8 py-9"
      (ngSubmit)="enviarEnlace()"
      autocomplete="off"
      novalidate
    >

      <p class="text-center text-sm text-[#3b2618] leading-6 mb-8">
        Ingresa el correo de tu cuenta. Si está registrado, recibirás un
        enlace para restablecer tu contraseña.
      </p>

      <!-- Confirmación -->
      @if(mensajeExito()) {
        <div class="mb-5 rounded-xl border border-green-300 bg-green-100 text-green-700 px-4 py-4 text-sm text-center">
          <div class="w-12 h-12 mx-auto rounded-full bg-green-200 flex items-center justify-center text-2xl mb-3">
            ✓
          </div>

          <p class="font-bold text-base">
            Solicitud enviada
          </p>

          <p class="mt-1 leading-6">
            {{ mensajeExito() }}
          </p>
        </div>
      }

      <!-- Error -->
      @if(error()) {
        <div class="mb-5 rounded-xl border border-red-300 bg-red-100 text-red-700 px-4 py-3 text-sm text-center">
          {{ error() }}
        </div>
      }

      <div class="space-y-5">

        <div>
          <label class="block text-sm font-semibold text-[#3b2618] mb-2">
            Correo electrónico
          </label>

          <input
            type="email"
            name="correo_recuperacion"
            [(ngModel)]="email"
            (input)="limpiarAlertas()"
            placeholder="ejemplo@correo.com"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
            inputmode="email"
            [disabled]="cargando()"
            class="w-full h-12 border border-[#b89c7a] bg-white px-4 text-[#2b1a10] outline-none rounded-lg focus:border-[#5b2d16] focus:ring-2 focus:ring-[#5b2d16]/20 disabled:bg-gray-100 disabled:cursor-not-allowed"
          />
        </div>

        <button
          type="submit"
          [disabled]="cargando()"
          class="w-full h-12 rounded-lg bg-[#8b542f] text-white text-sm font-bold tracking-wide hover:bg-[#6f4022] transition disabled:opacity-70 disabled:cursor-not-allowed flex items-center justify-center gap-2"
        >
          @if(cargando()) {
            <span class="inline-block w-4 h-4 border-2 border-white/40 border-t-white rounded-full animate-spin"></span>
          }

          <span>
            {{ cargando() ? 'ENVIANDO CORREO...' : 'ENVIAR ENLACE' }}
          </span>
        </button>

        <div class="relative py-2">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-[#d8c4a8]"></div>
          </div>

          <div class="relative flex justify-center">
            <span class="bg-[#fff8ec] px-4 text-xs text-[#6b4a34]">
              o
            </span>
          </div>
        </div>

        <button
          type="button"
          routerLink="/login"
          class="w-full h-12 rounded-lg border border-[#8b542f] bg-transparent text-[#5b2d16] text-sm font-bold tracking-wide hover:bg-[#f3e3cc] transition"
        >
          VOLVER AL LOGIN
        </button>

      </div>
    </form>

  </div>

</section>
