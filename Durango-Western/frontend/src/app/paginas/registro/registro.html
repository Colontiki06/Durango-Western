<section class="min-h-screen bg-[#f3e3cc] flex items-center justify-center px-4 py-14">

  <div class="w-full max-w-[460px] bg-[#fff8ec] shadow-xl border border-[#d8c4a8] rounded-2xl overflow-hidden">

    <!-- Encabezado -->
    <div class="bg-[#5b2d16] px-8 py-9 text-center">
      <h1 class="text-white text-3xl font-bold tracking-wide">
        Crear cuenta
      </h1>

      <p class="text-[#f3e3cc] text-sm mt-3">
        Regístrate en Durango Western
      </p>
    </div>

    <!-- Formulario -->
    <form class="px-8 py-9" (ngSubmit)="register()">

      <p class="text-center text-sm text-[#3b2618] leading-6 mb-8">
        Crea tu cuenta para guardar direcciones, consultar pedidos y comprar más rápido.
      </p>

      <div class="space-y-5">

        <div>
          <label class="block text-sm font-semibold text-[#3b2618] mb-2">
            Nombre completo
          </label>

          <input
            type="text"
            name="fullName"
            [(ngModel)]="fullName"
            placeholder="Nombre completo"
            autocomplete="name"
            class="w-full h-12 border border-[#b89c7a] bg-white px-4 text-[#2b1a10] outline-none rounded-lg focus:border-[#5b2d16] focus:ring-2 focus:ring-[#5b2d16]/20"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-[#3b2618] mb-2">
            Correo electrónico
          </label>

          <input
            type="email"
            name="email"
            [(ngModel)]="email"
            placeholder="ejemplo@correo.com"
            autocomplete="email"
            class="w-full h-12 border border-[#b89c7a] bg-white px-4 text-[#2b1a10] outline-none rounded-lg focus:border-[#5b2d16] focus:ring-2 focus:ring-[#5b2d16]/20"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-[#3b2618] mb-2">
            Contraseña
          </label>

          <input
            type="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Mínimo 8 caracteres"
            autocomplete="new-password"
            class="w-full h-12 border border-[#b89c7a] bg-white px-4 text-[#2b1a10] outline-none rounded-lg focus:border-[#5b2d16] focus:ring-2 focus:ring-[#5b2d16]/20"
          />
        </div>

        <div>
          <label class="block text-sm font-semibold text-[#3b2618] mb-2">
            Confirmar contraseña
          </label>

          <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Confirma tu contraseña"
            autocomplete="new-password"
            class="w-full h-12 border border-[#b89c7a] bg-white px-4 text-[#2b1a10] outline-none rounded-lg focus:border-[#5b2d16] focus:ring-2 focus:ring-[#5b2d16]/20"
          />
        </div>

        <p
          *ngIf="error"
          class="bg-red-100 border border-red-300 text-red-700 px-4 py-3 text-sm rounded-lg"
        >
          {{ error }}
        </p>

        <button
          type="submit"
          [disabled]="loading"
          class="w-full h-12 rounded-lg bg-[#8b542f] text-white text-sm font-bold tracking-wide hover:bg-[#6f4022] transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ loading ? 'CREANDO CUENTA...' : 'CREAR CUENTA' }}
        </button>

        <div class="relative py-2">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-[#d8c4a8]"></div>
          </div>

          <div class="relative flex justify-center">
            <span class="bg-[#fff8ec] px-4 text-xs text-[#6b4a34]">
              o
            </span>
          </div>
        </div>

        <button
          type="button"
          routerLink="/login"
          class="w-full h-12 rounded-lg border border-[#8b542f] bg-transparent text-[#5b2d16] text-sm font-bold tracking-wide hover:bg-[#f3e3cc] transition"
        >
          YA TENGO CUENTA
        </button>

      </div>
    </form>

  </div>

</section>
