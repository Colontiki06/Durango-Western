<div class="min-h-screen bg-[#f5ede1] px-5 md:px-10 py-10">

  <div class="max-w-7xl mx-auto">

    <!-- Título -->
    <h1 class="text-3xl md:text-4xl font-bold text-[#2f1b12] mb-10">
      Contáctanos
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">

      <!-- Formulario -->
      <section class="bg-[#fff8ec] p-6 md:p-8">

        <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
          Envíanos un mensaje
        </h2>

        <div class="space-y-5">

          <div>

            <label class="block text-[#2f1b12] mb-2">
              Nombre
            </label>

            <input
              type="text"
              class="w-full h-11 border border-[#cbb89d] bg-white px-3"
            >

          </div>

          <div>

            <label class="block text-[#2f1b12] mb-2">
              Correo electrónico
            </label>

            <input
              type="email"
              class="w-full h-11 border border-[#cbb89d] bg-white px-3"
            >

          </div>

          <div>

            <label class="block text-[#2f1b12] mb-2">
              Asunto
            </label>

            <input
              type="text"
              class="w-full h-11 border border-[#cbb89d] bg-white px-3"
            >

          </div>

          <div>

            <label class="block text-[#2f1b12] mb-2">
              Mensaje
            </label>

            <textarea
              rows="6"
              class="w-full border border-[#cbb89d] bg-white p-3 resize-none"
            ></textarea>

          </div>

          <button
            class="w-full bg-[#8a542f] hover:bg-[#6b3f26] text-white py-3 font-semibold transition"
          >
            Enviar mensaje
          </button>

        </div>

      </section>

      <!-- Información -->
      <section class="space-y-8">

        <!-- Imagen -->
        <div class="h-[320px] overflow-hidden bg-[#e7dccb]">

          <img
            src="https://images.unsplash.com/photo-1521334884684-d80222895322"
            alt="Sucursal"
            class="w-full h-full object-cover"
          >

        </div>

        <!-- Horarios -->
        <div class="bg-[#fff8ec] p-6">

          <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
            Horario de atención
          </h2>

          <div class="space-y-4 text-[#4b2e1f]">

            <div class="flex justify-between border-b border-[#d8c5aa] pb-3">

              <span>
                Lunes - Viernes
              </span>

              <span class="font-semibold">
                9:00 a.m. - 9:00 p.m.
              </span>

            </div>

            <div class="flex justify-between border-b border-[#d8c5aa] pb-3">

              <span>
                Sábado
              </span>

              <span class="font-semibold">
                9:00 a.m. - 8:00 p.m.
              </span>

            </div>

            <div class="flex justify-between">

              <span>
                Domingo
              </span>

              <span class="font-semibold">
                10:00 a.m. - 6:00 p.m.
              </span>

            </div>

          </div>

        </div>

        <!-- Información -->
        <div class="bg-[#fff8ec] p-6">

          <h2 class="text-2xl font-bold text-[#2f1b12] mb-6">
            Información
          </h2>

          <div class="space-y-3 text-[#4b2e1f]">

            <p>
              📍 Durango, México
            </p>

            <p>
              📞 +52 618 000 0000
            </p>

            <p>
              ✉ contacto@durangowestern.com
            </p>

          </div>

        </div>

      </section>

    </div>

  </div>

</div>
