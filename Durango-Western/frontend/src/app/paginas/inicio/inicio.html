<!-- HERO / BANNER SOLO IMAGEN -->
<section class="hero-banner" aria-label="Banner principal"></section>

<!-- CATEGORÍAS -->
<section class="categorias-section">
  <div class="section-strip">
    <h2>Categorías</h2>
  </div>

  <div class="categorias-carousel-wrapper">
    <button
      type="button"
      class="carousel-arrow carousel-arrow-left"
      aria-label="Anterior"
      (click)="scrollCategorias('left')"
    >
      ‹
    </button>

    <div
      class="categorias-carousel"
      #categoriasCarousel
    >
      <a routerLink="/productos/botas-caballero" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/BotasCaballero.PNG" alt="Botas de Caballero" />
        </div>
        <p>Botas de Caballero</p>
      </a>

      <a routerLink="/productos/botas-dama" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/BotasDama.png" alt="Botas de Dama" />
        </div>
        <p>Botas de Dama</p>
      </a>

      <a routerLink="/productos/sombreros" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/Sombreros.png" alt="Sombreros" />
        </div>
        <p>Sombreros</p>
      </a>

      <a routerLink="/productos/camisas" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/Camisas.png" alt="Camisas" />
        </div>
        <p>Camisas</p>
      </a>

      <a routerLink="/productos/cintos" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/Cintos.png" alt="Cintos" />
        </div>
        <p>Cintos</p>
      </a>

      <a routerLink="/productos/gorras" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/Gorras.PNG" alt="Gorras" />
        </div>
        <p>Gorras</p>
      </a>

      <a routerLink="/productos/accesorios" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/Accesorios.png" alt="Accesorios" />
        </div>
        <p>Accesorios</p>
      </a>

      <a routerLink="/productos/pantalones" class="categoria-card">
        <div class="categoria-image">
          <img src="/img/Pantalones.png" alt="Pantalones" />
        </div>
        <p>Pantalones</p>
      </a>
    </div>

    <button
      type="button"
      class="carousel-arrow carousel-arrow-right"
      aria-label="Siguiente"
      (click)="scrollCategorias('right')"
    >
      ›
    </button>
  </div>

  <div class="carousel-dots">
    <span class="dot" [class.active]="activeDot === 0"></span>
    <span class="dot" [class.active]="activeDot === 1"></span>
    <span class="dot" [class.active]="activeDot === 2"></span>
    <span class="dot" [class.active]="activeDot === 3"></span>
  </div>
</section>

<!-- LO MÁS VENDIDO -->
<section class="best-sellers-section">
  <div class="section-strip">
    <h2>Lo más vendido</h2>
  </div>

  <div class="products-grid">
    <article class="product-card">
      <a routerLink="/detalle-producto/sombrero-durango-premium" class="product-image">
        <img src="/img/Sombreros.png" alt="Sombrero Durango Western Premium" />
      </a>

      <div class="product-info">
        <h3>Sombrero Durango Western Premium</h3>
        <p>$1,499 MXN</p>

        <button
          type="button"
          class="add-cart-btn"
          (click)="addToCart({
            id: 'sombrero-durango-premium',
            nombre: 'Sombrero Durango Western Premium',
            precio: 1499,
            imagen: '/img/Sombreros.png'
          })"
        >
          Agregar al carrito
        </button>
      </div>
    </article>

    <article class="product-card">
      <a routerLink="/detalle-producto/bota-durango-floral" class="product-image">
        <img src="/img/BotasDama.png" alt="Bota Durango Floral Sierra" />
      </a>

      <div class="product-info">
        <h3>Bota Durango Floral Sierra</h3>
        <p>$2,499 MXN</p>

        <button
          type="button"
          class="add-cart-btn"
          (click)="addToCart({
            id: 'bota-durango-floral',
            nombre: 'Bota Durango Floral Sierra',
            precio: 2499,
            imagen: '/img/BotasDama.png'
          })"
        >
          Agregar al carrito
        </button>
      </div>
    </article>

    <article class="product-card">
      <a routerLink="/detalle-producto/bota-durango-ranch" class="product-image">
        <img src="/img/BotasCaballero.PNG" alt="Bota Durango Clásica Ranch" />
      </a>

      <div class="product-info">
        <h3>Bota Durango Clásica Ranch</h3>
        <p>$2,199 MXN</p>

        <button
          type="button"
          class="add-cart-btn"
          (click)="addToCart({
            id: 'bota-durango-ranch',
            nombre: 'Bota Durango Clásica Ranch',
            precio: 2199,
            imagen: '/img/BotasCaballero.PNG'
          })"
        >
          Agregar al carrito
        </button>
      </div>
    </article>
  </div>
</section>
