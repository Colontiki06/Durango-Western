<section class="min-h-screen bg-[#f3e3cc] flex justify-center px-4 py-10">
  <div class="w-full max-w-md bg-[#f3e3cc]">

    <!-- ENCABEZADO SIN IMAGEN -->
    <div class="bg-[#5b2d16] py-8 px-6 text-center">
      <h1 class="text-white text-2xl font-bold">
        Iniciar sesión
      </h1>

      <p class="text-[#f3e3cc] text-sm mt-2">
        Accede a tu cuenta Durango Western
      </p>
    </div>

    <!-- FORMULARIO -->
    <div class="px-8 py-10 bg-[#f3e3cc]">
      <p class="text-center text-sm text-[#2b1a10] mb-8">
        En caso de ya tener una cuenta existente, es necesario volver a registrar
        para poder ingresar en nuestro nuevo sitio web.
      </p>

      <div class="space-y-4">
        <input
          type="email"
          placeholder="Correo electrónico"
          class="w-full border border-[#7b6b5b] bg-white px-4 py-2 outline-none focus:border-[#5b2d16]"
        />

        <input
          type="password"
          placeholder="Contraseña"
          class="w-full border border-[#7b6b5b] bg-white px-4 py-2 outline-none focus:border-[#5b2d16]"
        />

        <a
          routerLink="/recuperar-contrasena"
          class="block text-xs underline text-[#5b2d16] hover:text-[#3d1f10]"
        >
          ¿Olvidaste tu contraseña?
        </a>

        <button
          type="button"
          (click)="login()"
          class="w-full bg-[#8b542f] text-white py-3 text-sm hover:bg-[#6f4022] transition"
        >
          INICIAR SESIÓN
        </button>

        <button
          type="button"
          routerLink="/registro"
          class="w-full bg-[#8b542f] text-white py-3 text-sm hover:bg-[#6f4022] transition"
        >
          CREAR CUENTA
        </button>
      </div>
    </div>
  </div>
</section>
