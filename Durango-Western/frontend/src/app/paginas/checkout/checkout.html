<div class="min-h-screen bg-[#f5ede1] px-5 md:px-10 py-8 md:py-10">

  <div class="max-w-7xl mx-auto">

    <h1 class="text-2xl md:text-3xl font-bold text-[#2f1b12] mb-8">
      Confirmación de compra
    </h1>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_420px] gap-12">

      <!-- Formulario -->
      <section class="bg-[#fff8ec] p-5 md:p-8">

        <h2 class="font-bold text-[#2f1b12] mb-5">
          Datos de entrega
        </h2>

        <div class="grid grid-cols-2 gap-4 mb-6">
          <button class="bg-[#8a542f] text-white py-4 font-semibold">
            Entrega en domicilio
          </button>

          <button class="border border-[#8a542f] text-[#2f1b12] py-4 font-semibold">
            Recoger en tienda
          </button>
        </div>

        <div class="mb-8">
          <label class="block text-sm text-[#2f1b12] mb-2">
            Código postal
          </label>

          <div class="flex gap-3">
            <input class="w-full h-11 border border-[#cbb89d] px-3 bg-white" type="text">

            <button class="bg-[#8a542f] text-white px-6">
              Buscar
            </button>
          </div>
        </div>

        <div class="mb-10">
          <h3 class="font-bold text-[#2f1b12] mb-4">
            Contacto
          </h3>

          <div class="space-y-4">
            <input class="w-full h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Nombre completo">
            <input class="w-full h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Correo electrónico">
            <input class="w-full h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Número de teléfono">
          </div>
        </div>

        <div class="mb-10">
          <h3 class="font-bold text-[#2f1b12] mb-4">
            Dirección
          </h3>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white md:col-span-2" placeholder="Calle">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Número exterior">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Número interior">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Colonia">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Ciudad">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Estado">
            <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Código postal">
          </div>
        </div>

        <div class="mb-10">
          <h3 class="font-bold text-[#2f1b12] mb-4">
            Pago
          </h3>

          <div class="space-y-4">
            <input class="w-full h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Cupón de descuento">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Nombre del titular">
              <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="Número de tarjeta">
              <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="MM/AA">
              <input class="h-11 border border-[#cbb89d] px-3 bg-white" placeholder="CVV">
            </div>
          </div>
        </div>

        <button class="w-full bg-[#8a542f] hover:bg-[#6b3f26] text-white py-3 font-semibold">
          Realizar pedido
        </button>

      </section>

      <!-- Resumen -->
      <aside class="bg-[#fff8ec] p-6 h-fit">

        <h2 class="font-bold text-[#2f1b12] mb-6">
          Resumen del pedido
        </h2>

        <div class="space-y-4 mb-8">
          @for(item of items; track $index) {
            <div class="flex gap-4">
              <div class="w-20 h-24 bg-[#e7dccb] flex items-center justify-center">
                <span class="text-3xl text-[#8b7355]">▧</span>
              </div>

              <div class="flex-1">
                <h3 class="text-sm font-bold text-[#2f1b12]">
                  Producto próximamente
                </h3>
                <p class="text-xs text-[#4b2e1f]">
                  Talla: 26
                </p>
                <p class="text-sm font-bold text-[#2f1b12] mt-2">
                  $0.00 MXN
                </p>
              </div>
            </div>
          }
        </div>

        <div class="border-t-2 border-[#2f1b12] pt-5 space-y-3 text-[#2f1b12]">
          <div class="flex justify-between">
            <span>Subtotal</span>
            <span>$0.00</span>
          </div>

          <div class="flex justify-between">
            <span>Envío</span>
            <span>Gratis</span>
          </div>

          <div class="flex justify-between font-bold text-lg">
            <span>Total</span>
            <span>$0.00 MXN</span>
          </div>
        </div>

      </aside>

    </div>

  </div>

</div>
