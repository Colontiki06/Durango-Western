<div class="top-bar">
  Envíos gratis en compras mínimas de $4,000
</div>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="navbar-container">

    <!-- LOGO -->
    <a
      routerLink="/"
      class="logo-link"
      aria-label="Durango Western inicio"
    >
      <img
        src="/img/logo-durango.png"
        alt="Durango Western"
        class="logo-img"
      />
    </a>

    <!-- ICONOS -->
    <div class="navbar-icons">

      <!-- BUSCADOR -->
      <button
        type="button"
        class="icon-button"
        aria-label="Buscar"
        (click)="toggleSearch()"
      >
        <img
          src="/icons/lupa.svg"
          alt="Buscar"
        />
      </button>

      <!-- USUARIO -->
      <button
        type="button"
        class="icon-button"
        (click)="goToUserArea()"
        aria-label="Área de usuario"
      >
        <img
          src="/icons/usuario.svg"
          alt="Usuario"
        />
      </button>

      <!-- CARRITO -->
      <button
        type="button"
        class="icon-button cart-button"
        routerLink="/carrito"
        aria-label="Carrito"
      >

        <img
          src="/icons/bolso.svg"
          alt="Carrito"
        />

        <span
          *ngIf="cartCount > 0"
          class="cart-badge"
        >
          {{ cartCount }}
        </span>

      </button>

    </div>

  </div>

</nav>

<!-- BUSCADOR DESPLEGABLE -->
@if(searchOpen) {

  <div class="search-dropdown">

    <div class="search-container">

      <input
        type="text"
        placeholder="Buscar botas, sombreros, camisas..."
        class="search-input"
      >

      <button
        type="button"
        class="search-btn"
      >
        Buscar
      </button>

    </div>

  </div>

}

<!-- MENÚ -->
<div class="menu-bar">

  <a routerLink="/productos/botas-caballero">
    Caballero
  </a>

  <a routerLink="/productos/dama">
    Dama
  </a>

  <a routerLink="/productos/ninos">
    Niños
  </a>

  <a routerLink="/productos/ofertas">
    Ofertas
  </a>

</div>
