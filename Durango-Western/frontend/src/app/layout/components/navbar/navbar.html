<div class="top-bar">
  Envíos gratis en compras mínimas de $4,000
</div>

<!-- NAVBAR -->
<nav class="navbar">

  <div class="navbar-container">

    <!-- LOGO -->
    <a
      routerLink="/"
      class="logo-link"
      aria-label="Durango Western inicio"
    >
      <img
        src="/img/logo-durango.png"
        alt="Durango Western"
        class="logo-img"
      />
    </a>

    <!-- ICONOS -->
    <div class="navbar-icons">

      <!-- BUSCADOR -->
      <button
        type="button"
        class="icon-button"
        aria-label="Buscar"
        (click)="toggleSearch()"
      >
        <img
          src="/icons/lupa.svg"
          alt="Buscar"
        />
      </button>

      <!-- USUARIO -->
<div class="user-menu-wrapper">

  <button
    type="button"
    class="icon-button"
    aria-label="Área de usuario"
  >
    <img
      src="/icons/usuario.svg"
      alt="Usuario"
    />
  </button>

  <div class="user-dropdown">

    @if(auth.isLoggedIn()) {

      <button type="button" (click)="goTo('/perfil')">
        Mi perfil
      </button>

      <button type="button" (click)="goTo('/pedidos')">
        Mis compras
      </button>

      <button type="button" (click)="goTo('/metodos-pago')">
        Métodos de pago
      </button>

      <button type="button" (click)="logout()">
        Cerrar sesión
      </button>

    } @else {

      <div class="px-3 py-3 text-left">
        <p class="text-[#2f1b12] font-bold mb-1">
          ¿Ya tienes cuenta?
        </p>

        <p class="text-[#8a542f] text-sm mb-3">
          Inicia sesión para ver tu perfil, pedidos y métodos de pago.
        </p>

        <button
          type="button"
          (click)="goTo('/login')"
          class="w-full bg-[#4b2e1f] text-white px-4 py-3 rounded-lg font-bold hover:bg-[#6b3f26] transition"
        >
          Iniciar sesión
        </button>
      </div>

    }

  </div>

</div>

      <!-- CARRITO -->
      <button
        type="button"
        class="icon-button cart-button"
        routerLink="/carrito"
        aria-label="Carrito"
      >

        <img
          src="/icons/bolso.svg"
          alt="Carrito"
        />

        <span
          *ngIf="cartCount > 0"
          class="cart-badge"
        >
          {{ cartCount }}
        </span>

      </button>

    </div>

  </div>

</nav>

<!-- BUSCADOR DESPLEGABLE -->
@if(searchOpen) {

  <div class="search-dropdown">

    <div class="search-container">

      <input
        type="text"
        placeholder="Buscar botas, sombreros, camisas..."
        class="search-input"
      >

      <button
        type="button"
        class="search-btn"
      >
        Buscar
      </button>

    </div>

  </div>

}

<!-- MENÚ -->
<div class="menu-bar">

  <a routerLink="/productos/botas-caballero">
    Caballero
  </a>

  <a routerLink="/productos/dama">
    Dama
  </a>

  <a routerLink="/productos/ninos">
    Niños
  </a>

  <a routerLink="/productos/ofertas">
    Ofertas
  </a>

</div>
